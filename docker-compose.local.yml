volumes:
  prostratsix_local_postgres_data: {}
  prostratsix_local_postgres_data_backups: {}
  prostratsix_local_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: prostratsix_local_django
    container_name: prostratsix_local_django
    depends_on:
      - postgres
      - redis
      - mailpit
    volumes:
      - /app/.venv
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - '8000:8000'
    command: /start

  node:
    build:
      context: .
      dockerfile: ./compose/local/node/Dockerfile
    image: prostratsix_local_node
    container_name: prostratsix_local_node
    depends_on:
      - django
    volumes:
      - .:/app:z
      # Keep the image's installed dependencies; don't let the host shadow them.
      - /app/node_modules
    environment:
      # browser-sync proxies the running Django dev server.
      - DJANGO_HOST=django:8000
    command: npm run dev
    ports:
      # browser-sync served site + UI
      - '3000:3000'
      - '3001:3001'

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: prostratsix_production_postgres
    container_name: prostratsix_local_postgres
    volumes:
      - prostratsix_local_postgres_data:/var/lib/postgresql
      - prostratsix_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres

  mailpit:
    image: docker.io/axllent/mailpit:latest
    container_name: prostratsix_local_mailpit
    ports:
      - "8025:8025"

  redis:
    image: docker.io/redis:8.8
    container_name: prostratsix_local_redis
    volumes:
      - prostratsix_local_redis_data:/data

  celeryworker:
    <<: *django
    image: prostratsix_local_celeryworker
    container_name: prostratsix_local_celeryworker
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: prostratsix_local_celerybeat
    container_name: prostratsix_local_celerybeat
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: prostratsix_local_flower
    container_name: prostratsix_local_flower
    ports:
      - '5555:5555'
    command: /start-flower
